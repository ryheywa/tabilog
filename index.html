<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>新規投稿 / tabilog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --bg-soft:#f7f7f7;
  --bg-card:#f2f2f2;
  --bg-hover:#e9e9e9;
  --line:#ececec;
  --line-2:#d9d9d9;
  --ink:#111111;
  --ink-dim:#4b4b4b;
  --ink-mute:#767676;
  --ink-faint:#a8a8a8;
  --accent:#e60023;
  --accent-hover:#b5001b;
  --success:#16a34a;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 24px 60px rgba(0,0,0,0.18);
}

html,body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:"Inter","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100dvh;
  overscroll-behavior-y:contain;
  padding-bottom:calc(96px + env(safe-area-inset-bottom));
}
input,textarea,button,select{font-family:inherit;color:inherit;font-size:16px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

.jp{font-family:"Noto Sans JP","Inter",sans-serif}

/* ====== NAV ====== */
.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,0.9);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line);
}
.nav-inner{
  max-width:720px;margin:0 auto;
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
}
.nav-back{
  width:40px;height:40px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:var(--ink);
  cursor:pointer;transition:background .15s;flex-shrink:0;
}
.nav-back:hover{background:var(--bg-hover)}
.nav-back svg{width:22px;height:22px}
.nav-title{
  flex:1;font-size:18px;font-weight:700;letter-spacing:-0.01em;
}
.nav-save{
  padding:10px 18px;border-radius:999px;
  background:var(--accent);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.nav-save:hover:not(:disabled){background:var(--accent-hover)}
.nav-save:disabled{background:#efefef;color:var(--ink-mute);cursor:not-allowed}
.nav-save svg{width:14px;height:14px}

/* ====== MAIN ====== */
.wrap{max-width:720px;margin:0 auto;padding:24px 16px 40px}
.section{margin-bottom:28px}
.section-label{
  font-size:13px;font-weight:700;color:var(--ink);
  margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.section-label .opt{color:var(--ink-mute);font-weight:500;font-size:12px}

/* ====== PHOTO ZONE ====== */
.photo-zone{
  position:relative;
  width:100%;aspect-ratio:4/5;
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background .15s;
}
.photo-zone.has-photo{cursor:default;aspect-ratio:auto}
.photo-zone:hover:not(.has-photo){background:var(--bg-hover)}
.photo-zone.dragover{background:#ffe9ed;outline:3px dashed var(--accent);outline-offset:-8px}

.pz-empty{
  display:flex;flex-direction:column;align-items:center;gap:18px;
  padding:32px;text-align:center;
}
.pz-icon{
  width:72px;height:72px;border-radius:50%;
  background:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-md);
}
.pz-icon svg{width:30px;height:30px;color:var(--ink)}
.pz-title{font-size:20px;font-weight:700;letter-spacing:-0.01em}
.pz-sub{font-size:14px;color:var(--ink-mute);line-height:1.55;max-width:320px}
.pz-btns{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;justify-content:center}
.pz-btn{
  padding:12px 22px;border-radius:999px;
  background:var(--ink);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:background .15s;
}
.pz-btn:hover{background:#333}
.pz-btn.ghost{background:var(--bg-hover);color:var(--ink)}
.pz-btn.ghost:hover{background:#dcdcdc}

.pz-preview{
  width:100%;
  display:block;
  max-height:80vh;
  object-fit:contain;
  background:#111;
}

.pz-actions{
  position:absolute;top:12px;right:12px;
  display:flex;gap:8px;
}
.pz-chip{
  padding:8px 14px;border-radius:999px;
  background:rgba(255,255,255,0.96);
  border:none;color:var(--ink);
  font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:var(--shadow-md);
  display:inline-flex;align-items:center;gap:6px;
}
.pz-chip:hover{background:#fff}
.pz-chip.danger{color:var(--accent)}
.pz-chip svg{width:14px;height:14px}

/* multi-photo secondary */
.photo-strip{
  display:flex;gap:8px;margin-top:10px;
  overflow-x:auto;padding-bottom:4px;
  scroll-snap-type:x mandatory;
}
.photo-strip::-webkit-scrollbar{display:none}
.photo-thumb{
  position:relative;flex-shrink:0;
  width:72px;height:72px;border-radius:12px;
  overflow:hidden;cursor:pointer;
  background:var(--bg-card);
  scroll-snap-align:start;
}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .rm{
  position:absolute;top:3px;right:3px;
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,0.72);color:#fff;border:none;
  font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.photo-thumb.add{
  border:1.5px dashed var(--line-2);background:transparent;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-mute);font-size:24px;font-weight:300;
}
.photo-thumb.add:hover{background:var(--bg-card);color:var(--ink);border-color:var(--ink-mute)}

/* ====== LOCATION CARD ====== */
.loc-card{
  display:flex;align-items:center;gap:12px;
  padding:14px;background:var(--bg-card);
  border-radius:var(--radius-md);
  cursor:pointer;transition:background .15s;
}
.loc-card:hover{background:var(--bg-hover)}
.loc-map{
  width:64px;height:64px;border-radius:12px;
  background:#e8e8e8 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><path d="M0 0h64v64H0z" fill="%23e8e8e8"/><path d="M0 24l32-8 32 8v16L32 48 0 40z" fill="%23d4d4d4"/><circle cx="32" cy="30" r="6" fill="%23e60023"/><circle cx="32" cy="30" r="2" fill="%23fff"/></svg>');
  background-size:cover;flex-shrink:0;
  position:relative;
}
.loc-map.empty{
  background:#e8e8e8;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-mute);
}
.loc-map.empty svg{width:24px;height:24px}
.loc-info{flex:1;min-width:0}
.loc-label{
  font-size:11px;font-weight:700;color:var(--ink-mute);
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px;
  display:flex;align-items:center;gap:6px;
}
.loc-label .pulse{
  width:6px;height:6px;border-radius:50%;background:var(--success);
  animation:pulse 1.6s ease-in-out infinite;
}
.loc-label.off .pulse{background:var(--ink-faint);animation:none}
.loc-place{
  font-size:16px;font-weight:700;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:"Noto Sans JP",sans-serif;
}
.loc-coords{
  font-size:12px;color:var(--ink-mute);margin-top:2px;
  font-variant-numeric:tabular-nums;
}
.loc-action{
  padding:8px 14px;border-radius:999px;
  background:#fff;border:1px solid var(--line-2);
  font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;
  flex-shrink:0;
}
.loc-action:hover{background:var(--bg-card)}

@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.8)}
}

/* ====== STORY TEXTAREA ====== */
.story{
  position:relative;
  padding:20px 20px 14px;
  background:var(--bg-card);
  border-radius:var(--radius-md);
  transition:background .15s;
}
.story:focus-within{background:#efefef}
.story textarea{
  width:100%;min-height:120px;max-height:400px;resize:none;
  background:transparent;border:none;outline:none;
  font-family:"Noto Sans JP","Inter",sans-serif;
  font-size:17px;line-height:1.7;color:var(--ink);
  font-weight:500;
}
.story textarea::placeholder{color:var(--ink-mute);font-weight:400}
.story-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;gap:8px;
}
.story-prompts{
  display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0;overflow-x:auto;
  scrollbar-width:none;
}
.story-prompts::-webkit-scrollbar{display:none}
.prompt-chip{
  padding:6px 12px;border-radius:999px;
  background:#fff;border:1px solid var(--line-2);
  font-size:13px;color:var(--ink-dim);cursor:pointer;white-space:nowrap;
  transition:all .15s;
  font-family:"Noto Sans JP",sans-serif;
  min-height:32px;
}
.prompt-chip:hover{border-color:var(--ink);color:var(--ink)}
.mic-btn{
  width:44px;height:44px;border-radius:50%;
  background:#fff;border:1px solid var(--line-2);
  color:var(--ink);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.mic-btn:hover{border-color:var(--ink)}
.mic-btn.rec{background:var(--accent);color:#fff;border-color:var(--accent);animation:pulse-rec 1.4s ease-in-out infinite}
@keyframes pulse-rec{
  0%,100%{box-shadow:0 0 0 0 rgba(230,0,35,0.3)}
  50%{box-shadow:0 0 0 10px rgba(230,0,35,0)}
}
.mic-btn svg{width:18px;height:18px}

/* ====== BOARD PICKER ====== */
.board-picker{
  display:flex;gap:8px;flex-wrap:wrap;
}
.board-chip{
  padding:9px 14px 9px 12px;
  border-radius:999px;background:#fff;
  border:1.5px solid var(--line-2);
  font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  transition:all .15s;
  font-family:"Noto Sans JP","Inter",sans-serif;
  min-height:40px;
}
.board-chip:hover{border-color:var(--ink)}
.board-chip.selected{
  background:var(--ink);color:#fff;border-color:var(--ink);
}
.board-chip .emo{font-size:15px}
.board-chip.new{
  border-style:dashed;color:var(--ink-mute);
}
.board-chip.new:hover{color:var(--ink);border-color:var(--ink)}

/* ====== DETAILS (collapse) ====== */
.details{
  background:var(--bg-card);
  border-radius:var(--radius-md);
  overflow:hidden;
}
.details-head{
  padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;font-size:15px;font-weight:700;
  user-select:none;
}
.details-head .chev{
  transition:transform .2s;
  color:var(--ink-mute);
}
.details.open .details-head .chev{transform:rotate(180deg)}
.details-body{
  display:none;
  padding:0 18px 18px;
}
.details.open .details-body{display:block}
.details-body .row{
  display:grid;grid-template-columns:96px 1fr;align-items:center;
  padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);gap:8px;
}
.details-body .row:last-child{border-bottom:none}
.details-body .k{
  font-size:13px;color:var(--ink-mute);font-weight:600;
  font-family:"Noto Sans JP",sans-serif;
}
.details-body .v{font-size:15px}
.details-body input,
.details-body select{
  width:100%;padding:8px 10px;border-radius:8px;
  border:1px solid var(--line-2);background:#fff;
  font-size:15px;outline:none;transition:border-color .15s;
}
.details-body input:focus,.details-body select:focus{border-color:var(--ink)}

.mood-picker{display:flex;gap:6px;flex-wrap:wrap}
.mood-btn{
  padding:6px 12px;border-radius:999px;
  background:#fff;border:1px solid var(--line-2);
  font-size:13px;color:var(--ink-dim);cursor:pointer;
  font-family:"Noto Sans JP",sans-serif;min-height:32px;
}
.mood-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ====== BOTTOM ACTION (mobile-friendly duplicate) ====== */
.save-fab{
  position:fixed;left:0;right:0;
  bottom:calc(72px + env(safe-area-inset-bottom));
  padding:10px 16px;z-index:40;
  display:flex;justify-content:center;pointer-events:none;
}
.save-fab button{
  pointer-events:auto;
  padding:14px 32px;border-radius:999px;
  background:var(--accent);color:#fff;border:none;
  font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 12px 32px rgba(230,0,35,0.32);
  display:inline-flex;align-items:center;gap:8px;
  transition:background .15s, transform .15s;
}
.save-fab button:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px)}
.save-fab button:disabled{background:#c9c9c9;cursor:not-allowed;box-shadow:none;color:#fff}

/* ====== BOTTOM TAB BAR (global) ====== */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:rgba(255,255,255,0.96);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-inner{
  max-width:720px;margin:0 auto;
  display:grid;grid-template-columns:repeat(3,1fr);
  height:64px;
}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--ink-mute);cursor:pointer;background:none;border:none;
  transition:color .15s;text-decoration:none;
  font-family:"Noto Sans JP","Inter",sans-serif;font-size:11px;font-weight:700;
}
.tab svg{width:24px;height:24px}
.tab.on{color:var(--ink)}
.tab.on svg{stroke-width:2.4}
.tab:hover{color:var(--ink)}

/* ====== TOAST ====== */
.toast{
  position:fixed;bottom:calc(150px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(8px);
  background:#111;color:#fff;
  padding:12px 22px;border-radius:999px;
  font-size:14px;font-weight:600;white-space:nowrap;
  opacity:0;pointer-events:none;z-index:100;
  transition:all .25s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--accent)}

/* ====== MODAL (new board) ====== */
.modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.5);
  display:none;align-items:flex-end;justify-content:center;
  padding:0;
}
.modal.open{display:flex;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@media (min-width:640px){
  .modal{align-items:center;padding:20px}
}
.modal-card{
  width:100%;max-width:480px;
  background:#fff;
  border-radius:24px 24px 0 0;
  padding:24px 22px calc(22px + env(safe-area-inset-bottom));
  animation:slideup .25s cubic-bezier(.2,.8,.2,1);
}
@media (min-width:640px){
  .modal-card{border-radius:24px}
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{
  width:40px;height:4px;border-radius:2px;background:#e5e5e5;
  margin:0 auto 14px;
}
.modal-title{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-0.02em}
.modal-sub{color:var(--ink-mute);font-size:14px;margin-bottom:18px;font-family:"Noto Sans JP",sans-serif}

.form-row{margin-bottom:14px}
.form-label{
  display:block;font-size:12px;font-weight:700;
  color:var(--ink-mute);margin-bottom:6px;
  letter-spacing:0.04em;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.input{
  width:100%;padding:12px 14px;border-radius:12px;
  background:var(--bg-card);border:1.5px solid transparent;
  font-size:16px;outline:none;transition:all .15s;
}
.input:focus{background:#fff;border-color:var(--ink)}
.emoji-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:6px;
}
.emoji-grid button{
  aspect-ratio:1;border-radius:10px;
  background:var(--bg-card);border:1.5px solid transparent;
  font-size:22px;cursor:pointer;transition:all .15s;
}
.emoji-grid button:hover{background:var(--bg-hover)}
.emoji-grid button.selected{background:#fff;border-color:var(--ink)}

.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{
  flex:1;padding:14px;border-radius:999px;
  font-size:15px;font-weight:700;border:none;cursor:pointer;
  transition:all .15s;min-height:48px;
}
.modal-actions .cancel{background:var(--bg-card);color:var(--ink)}
.modal-actions .cancel:hover{background:var(--bg-hover)}
.modal-actions .ok{background:var(--ink);color:#fff}
.modal-actions .ok:hover{background:#333}
.modal-actions .ok:disabled{background:#ccc;cursor:not-allowed}

/* ====== RESPONSIVE ====== */
@media (max-width:640px){
  .nav-inner{padding:10px 12px}
  .wrap{padding:16px 14px 32px}
  .section{margin-bottom:24px}
}

/* subtle fade on load */
.fade-in{animation:fi .3s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-back" href="timeline.html" aria-label="戻る">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="nav-title">新規投稿</div>
    <button class="nav-save" id="save-top" disabled>
      <span id="save-top-label">保存</span>
    </button>
  </div>
</nav>

<main class="wrap" id="root"></main>

<!-- Save FAB (mobile visible) -->
<div class="save-fab">
  <button id="save-fab" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M5 13l4 4L19 7"/></svg>
    <span id="save-fab-label">保存する</span>
  </button>
</div>

<!-- Bottom tab bar -->
<nav class="tabbar" aria-label="main">
  <div class="tabbar-inner">
    <a class="tab" href="timeline.html" aria-label="フィード">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      フィード
    </a>
    <a class="tab" href="map.html" aria-label="マップ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
      マップ
    </a>
    <a class="tab on" href="index.html" aria-label="新規投稿">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>
      投稿
    </a>
  </div>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NEW BOARD MODAL -->
<div class="modal" id="nb-modal" role="dialog" aria-modal="true" aria-labelledby="nb-title">

// ============================================================
// FILE HANDLING & EXIF
// ============================================================
async function handleFiles(fileList, mode='primary'){
  const files = Array.from(fileList || []).filter(f => f && f.type && f.type.startsWith('image/'));
  if(!files.length) return;

  if(mode === 'primary'){
    // replace first photo (or create)
    const first = files[0];
    const processed = await processFile(first);
    if(state.photos.length === 0){
      state.photos.push(processed);
    } else {
      state.photos[0] = processed;
    }
    // additional files go to strip
    for(let i=1; i<files.length && state.photos.length<8; i++){
      state.photos.push(await processFile(files[i]));
    }
  } else {
    for(const f of files){
      if(state.photos.length>=8) break;
      state.photos.push(await processFile(f));
    }
  }

  // Try to read place from first photo's EXIF
  const head = state.photos[0];
  if(head && head.lat != null && head.lng != null && !state.place){
    state.place = { lat: head.lat, lng: head.lng, name: null, source: 'exif' };
    reverseGeocode(head.lat, head.lng).then(name=>{
      if(state.place && state.place.source === 'exif'){
        state.place.name = name || null;
        renderLocation();
      }
    });
  }

  render();
}

async function processFile(file){
  // try EXIF first
  let lat = null, lng = null, dateTaken = null;
  try{
    const exif = await window.exifr.parse(file, { gps:true });
    if(exif){
      if(typeof exif.latitude === 'number') lat = exif.latitude;
      if(typeof exif.longitude === 'number') lng = exif.longitude;
      if(exif.DateTimeOriginal) dateTaken = exif.DateTimeOriginal;
    }
  }catch(e){/* ignore */}

  // downscale to <=1600px
  const dataUrl = await fileToDataUrl(file, 1600, 0.88);

  return { dataUrl, file: null, lat, lng, dateTaken, name:file.name };
}

function fileToDataUrl(file, maxSide, quality){
  return new Promise((resolve, reject)=>{
    const fr = new FileReader();
    fr.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(cv.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = fr.result;
    };
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
}

// Reverse geocode via OpenStreetMap Nominatim (no key, public)
const geoCache = new Map();
async function reverseGeocode(lat, lng){
  const key = `${lat.toFixed(4)},${lng.toFixed(4)}`;
  if(geoCache.has(key)) return geoCache.get(key);
  try{
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=14&accept-language=ja`;
    const r = await fetch(url, { headers: { 'Accept':'application/json' } });
    if(!r.ok) return null;
    const j = await r.json();
    const a = j.address || {};
    const parts = [
      a.town || a.city || a.village || a.suburb || a.county,
      a.state
    ].filter(Boolean);
    const name = parts.join(' · ') || j.display_name || null;
    geoCache.set(key, name);
    return name;
  }catch(e){ return null; }
}

function renderLocation(){
  const el = document.getElementById('loc-card');
  if(!el) return;
  const p = state.place;
  if(!p){
    el.innerHTML = `

        <div class="loc-place jp" style="color:var(--ink-mute);font-weight:500">写真にGPSが含まれていません</div>
      </div>
      <button class="loc-action" id="loc-manual">現在地を使う</button>
    `;
    document.getElementById('loc-manual').onclick = useCurrentLocation;
    return;
  }

  const mapUrl = `https://staticmap.openstreetmap.de/staticmap.php?center=${p.lat},${p.lng}&zoom=12&size=128x128&markers=${p.lat},${p.lng},red-pushpin`;
  const sourceLabel = p.source === 'exif' ? 'EXIF GPS' : p.source === 'geo' ? '現在地' : '手動';
  el.innerHTML = `
    <div class="loc-map" style="background-image:url('${mapUrl}'), linear-gradient(135deg,#e5e5e5,#d4d4d4);background-size:cover;background-position:center"></div>
    <div class="loc-info">
      <div class="loc-label"><span class="pulse"></span>${sourceLabel}</div>
      <div class="loc-place jp">${p.name ? escapeHtml(p.name) : '場所を特定中…'}</div>
      <div class="loc-coords">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
    </div>
    <button class="loc-action" id="loc-clear" title="変更">変更</button>
  `;
  document.getElementById('loc-clear').onclick = ()=>{
    if(confirm('場所情報を消しますか？（現在地に取り直せます）')){
      state.place = null;
      renderLocation();
    }
  };
}

function useCurrentLocation(){
  if(!navigator.geolocation){ toast('この端末は位置情報に対応していません', true); return; }
  const btn = document.getElementById('loc-manual');
  if(btn){ btn.textContent = '取得中…'; btn.disabled = true; }
  navigator.geolocation.getCurrentPosition(
    async (pos)=>{
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      state.place = { lat, lng, name:null, source:'geo' };
      renderLocation();
      const name = await reverseGeocode(lat, lng);
      if(state.place && state.place.source === 'geo'){
        state.place.name = name;
        renderLocation();
      }
    },
    (err)=>{
      toast('位置情報を取得できませんでした', true);
      if(btn){ btn.textContent = '現在地を使う'; btn.disabled = false; }
    },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

// STORY (textarea + prompts + speech)
// ============================================================
function bindStory(){
  const ta = document.getElementById('story-ta');
  if(!ta) return;
  ta.value = state.story || '';
  const count = document.getElementById('story-count');
  const update = ()=>{
    state.story = ta.value;
    if(count) count.textContent = `${ta.value.length} / 500`;
    autoSize();
    updateSaveEnabled();
    saveDraft();
  };
  const autoSize = ()=>{
    ta.style.height = 'auto';
    ta.style.height = Math.min(400, Math.max(120, ta.scrollHeight)) + 'px';
  };
  ta.addEventListener('input', update);
  autoSize();
  update();

  document.querySelectorAll('.prompt-chip').forEach(c=>{
    c.onclick = ()=>{
      const p = c.dataset.p;
      const sep = ta.value && !ta.value.endsWith('\n') ? '\n\n' : '';
      ta.value = ta.value + sep + p + '\n';
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      update();
    };
  });

  // speech recognition (ja-JP)
  const mic = document.getElementById('mic-btn');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    mic.style.opacity = '0.4';
    mic.title = '音声入力非対応';
    mic.onclick = ()=> toast('この端末は音声入力に対応していません', true);
  } else {
    mic.onclick = ()=>{
      if(recognizer && mic.classList.contains('rec')){
        try{ recognizer.stop(); }catch(e){}
        return;
      }
      recognizer = new SpeechRecognition();
      recognizer.lang = 'ja-JP';
      recognizer.continuous = true;
      recognizer.interimResults = false;
      recognizer.onstart = ()=> mic.classList.add('rec');
      recognizer.onend = ()=> mic.classList.remove('rec');
      recognizer.onerror = (e)=>{
        mic.classList.remove('rec');
        if(e.error !== 'no-speech') toast('音声入力エラー: ' + e.error, true);
      };
      recognizer.onresult = (ev)=>{
        let text = '';
        for(let i=ev.resultIndex; i<ev.results.length; i++){
          if(ev.results[i].isFinal) text += ev.results[i][0].transcript;
        }
        if(text){
          const sep = ta.value && !ta.value.endsWith(' ') && !ta.value.endsWith('\n') ? ' ' : '';
          ta.value = ta.value + sep + text;
          update();
        }
      };
      try{ recognizer.start(); }catch(e){ toast('音声入力の開始に失敗', true); }
    };
  }
}

  // emoji picker
  document.querySelectorAll('#nb-emoji button').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('#nb-emoji button').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    };
  });
  document.getElementById('nb-cancel').onclick = closeNewBoard;
  m.onclick = (e)=>{ if(e.target === m) closeNewBoard(); };
  document.getElementById('nb-ok').onclick = ()=>{
    const nm = name.value.trim();
    if(!nm){ name.focus(); return; }
    const sel = document.querySelector('#nb-emoji button.selected');
    const emoji = sel ? sel.dataset.e : '📷';
    const id = 'b_' + Math.random().toString(36).slice(2,8);
    const newBoard = { id, name:nm, emoji };
    allBoards.push(newBoard);
    saveBoards(allBoards);
    state.boards.push(id);
    closeNewBoard();
    renderBoardPicker();
    toast(`「${nm}」を作成しました`);
  };
}
function closeNewBoard(){ document.getElementById('nb-modal').classList.remove('open'); }

// ============================================================
// DETAILS
// ============================================================
function bindDetails(){
  const d = document.getElementById('details');
  if(!d) return;
  document.getElementById('details-toggle').onclick = ()=> d.classList.toggle('open');
  document.getElementById('det-date').oninput = (e)=>{ state.date = e.target.value; saveDraft(); };
  document.getElementById('det-weather').onchange = (e)=>{ state.weather = e.target.value; saveDraft(); };
  document.getElementById('det-companion').oninput = (e)=>{ state.companion = e.target.value; saveDraft(); };
  document.querySelectorAll('.mood-btn').forEach(b=>{
    b.onclick = ()=>{
      state.mood = (state.mood === b.dataset.m) ? '' : b.dataset.m;
      document.querySelectorAll('.mood-btn').forEach(x=>x.classList.toggle('on', x.dataset.m === state.mood));
      saveDraft();
    };
  });
}

// ============================================================
// SAVE
// ============================================================
function updateSaveEnabled(){
  const ok = state.photos.length > 0; // only require 1 photo
  const topBtn = document.getElementById('save-top');
  const fabBtn = document.getElementById('save-fab');
  topBtn.disabled = !ok;
  fabBtn.disabled = !ok;
}

async function save(){
  if(state.photos.length === 0) return;
  const topBtn = document.getElementById('save-top');
  const fabBtn = document.getElementById('save-fab');
  const topLabel = document.getElementById('save-top-label');
  const fabLabel = document.getElementById('save-fab-label');
  topBtn.disabled = true; fabBtn.disabled = true;
  topLabel.textContent = '保存中…'; fabLabel.textContent = '保存中…';

  try{
    // Build payload compatible with existing GAS schema
    const firstPhotoGps = state.photos.find(p=>p.lat != null && p.lng != null);
    const place = state.place;
    const gpsLat = place ? place.lat : (firstPhotoGps ? firstPhotoGps.lat : null);
    const gpsLng = place ? place.lng : (firstPhotoGps ? firstPhotoGps.lng : null);

    const photosPayload = state.photos.map((p, i)=> ({
      image: p.dataUrl,
      caption: i === 0 ? (state.story || '') : '',
      lat: p.lat,
      lng: p.lng,
    }));

    const payload = {
      date: state.date,
      weather: state.weather,
      companion: state.companion,
      routes: [],
      photos: photosPayload,
      senses: {},
      food: '',
      mood: state.mood,
      highlight: state.story,
      discovery: place && place.name ? place.name : '',
      destination: place && place.name ? place.name : '',
      gpsLat, gpsLng,
    };

    const res = await fetch(TABILOG_CONFIG.GAS_URL, { method:'POST', body: JSON.stringify(payload) });
    const json = await res.json().catch(()=>({}));
    if(!json.success && !(res.ok)) throw new Error(json.error || 'save failed');

    // persist board assignments (we need post id; if GAS returned, use it; else fallback to timestamp)
    const pinId = json.id || json.row || `local_${Date.now()}`;
    if(state.boards.length){
      const assign = loadAssign();
      assign[pinId] = state.boards.slice();
      saveAssign(assign);
    }

    toast('保存しました');
    localStorage.removeItem(TABILOG_CONFIG.DRAFT_KEY);
    setTimeout(()=>{ location.href = 'timeline.html'; }, 600);
  }catch(err){
    console.error(err);
    toast('保存に失敗しました。通信環境を確認してください', true);
    topBtn.disabled = false; fabBtn.disabled = false;
    topLabel.textContent = '保存'; fabLabel.textContent = '保存する';
  }
}

// ============================================================
// DRAFT persistence
// ============================================================
let draftTimer = null;
function saveDraft(){
  clearTimeout(draftTimer);
  draftTimer = setTimeout(()=>{
    try{
      const light = {
        story: state.story,
        boards: state.boards,
        date: state.date,
        weather: state.weather,
        companion: state.companion,
        mood: state.mood,
        place: state.place,
        photoCount: state.photos.length, // don't store big data URLs in draft
      };
      localStorage.setItem(TABILOG_CONFIG.DRAFT_KEY, JSON.stringify(light));
    }catch(e){}
  }, 500);
}
function loadDraft(){
  try{
    const raw = localStorage.getItem(TABILOG_CONFIG.DRAFT_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(d.story) state.story = d.story;
    if(d.boards) state.boards = d.boards;
    if(d.date) state.date = d.date;
    if(d.weather) state.weather = d.weather;
    if(d.companion) state.companion = d.companion;
    if(d.mood) state.mood = d.mood;
    if(d.place) state.place = d.place;
  }catch(e){}
}

// ============================================================
// UTIL
// ============================================================
function toast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

// ============================================================
// GLOBAL FILE INPUT BINDINGS
// ============================================================
document.getElementById('file-primary').addEventListener('change', e=> handleFiles(e.target.files, 'primary'));
document.getElementById('file-camera').addEventListener('change', e=> handleFiles(e.target.files, 'primary'));
document.getElementById('file-add').addEventListener('change', e=> handleFiles(e.target.files, 'add'));

document.getElementById('save-top').addEventListener('click', save);
document.getElementById('save-fab').addEventListener('click', save);

// ============================================================
// BOOT
// ============================================================
loadDraft();
render();
</script>
