<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>マップ / tabilog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ====== SHARED STYLES (inlined from _shared.css concept) ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --bg-soft:#f7f7f7;
  --bg-card:#f2f2f2;
  --bg-hover:#e9e9e9;
  --line:#ececec;
  --line-2:#d9d9d9;
  --ink:#111111;
  --ink-dim:#4b4b4b;
  --ink-mute:#767676;
  --ink-faint:#a8a8a8;
  --accent:#e60023;
  --accent-hover:#b5001b;
  --success:#16a34a;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 24px 60px rgba(0,0,0,0.18);
}

html,body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:"Inter","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100dvh;
  overscroll-behavior-y:contain;
}
input,textarea,button,select{font-family:inherit;color:inherit;font-size:16px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

.jp{font-family:"Noto Sans JP","Inter",sans-serif}

/* ====== NAV ====== */
.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,0.9);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line);
}
.nav-inner{
  max-width:720px;margin:0 auto;
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;
}
.brand-name{font-size:18px;font-weight:700;letter-spacing:-0.01em}
.nav-save{
  padding:10px 18px;border-radius:999px;
  background:var(--accent);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;
  flex-shrink:0;text-decoration:none;
}
.nav-save:hover{background:var(--accent-hover)}
.nav-save svg{width:14px;height:14px}

/* ====== TABBAR ====== */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:rgba(255,255,255,0.96);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-inner{
  max-width:720px;margin:0 auto;
  display:grid;grid-template-columns:repeat(3,1fr);
  height:64px;
}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--ink-mute);cursor:pointer;background:none;border:none;
  transition:color .15s;text-decoration:none;
  font-family:"Noto Sans JP","Inter",sans-serif;font-size:11px;font-weight:700;
}
.tab svg{width:24px;height:24px}
.tab.on{color:var(--ink)}
.tab.on svg{stroke-width:2.4}
.tab:hover{color:var(--ink)}

/* ====== TOAST ====== */
.toast{
  position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(8px);
  background:#111;color:#fff;
  padding:12px 22px;border-radius:999px;
  font-size:14px;font-weight:600;white-space:nowrap;
  opacity:0;pointer-events:none;z-index:100;
  transition:all .25s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--accent)}

/* ====== MAP-SPECIFIC STYLES ====== */
body{padding-bottom:0;overflow:hidden}

.app{
  display:flex;flex-direction:column;
  height:100dvh;
}

/* stats bar */
.stats{
  max-width:720px;margin:0 auto;width:100%;
  padding:12px 16px;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--line);
  border-bottom:1px solid var(--line);
}
.stats-cell{
  background:#fff;padding:10px 12px;
  text-align:center;
}
.stats-val{
  font-size:22px;font-weight:800;letter-spacing:-0.02em;
  font-variant-numeric:tabular-nums;
  line-height:1.1;
}
.stats-label{
  font-size:11px;color:var(--ink-mute);font-weight:600;
  letter-spacing:0.06em;margin-top:2px;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.stats-val .pct{font-size:12px;color:var(--ink-mute);font-weight:500;margin-left:2px}

/* map area */
.map-wrap{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#e9ecef;
}
#map{width:100%;height:100%}

/* loading */
.map-loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;background:#fff;z-index:5;
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--accent);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.map-loading-text{font-size:14px;color:var(--ink-mute);font-family:"Noto Sans JP",sans-serif}

/* floating controls */
.map-legend{
  position:absolute;top:12px;left:12px;z-index:4;
  padding:10px 14px;border-radius:14px;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);
  box-shadow:var(--shadow-md);
  display:none;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.map-legend .title{
  font-size:10px;font-weight:700;color:var(--ink-mute);
  letter-spacing:0.1em;margin-bottom:6px;text-transform:uppercase;
}
.map-legend .items{display:flex;flex-direction:column;gap:4px}
.map-legend .item{
  display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-dim);
}
.map-legend .dot{width:10px;height:10px;border-radius:50%}

/* empty state */
.map-empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:40px 24px;text-align:center;
  background:#fff;z-index:5;
}
.map-empty-mark{
  width:80px;height:80px;border-radius:50%;
  background:var(--bg-card);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-mute);
}
.map-empty-mark svg{width:36px;height:36px}
.map-empty-title{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.map-empty-msg{color:var(--ink-mute);font-size:14px;line-height:1.6;max-width:320px;font-family:"Noto Sans JP",sans-serif}
.map-empty-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:12px 22px;border-radius:999px;background:var(--accent);color:#fff;
  font-weight:700;font-size:14px;text-decoration:none;
}
.map-empty-btn:hover{background:var(--accent-hover)}
.map-empty-btn svg{width:14px;height:14px}

/* pin drawer */
.drawer{
  position:absolute;left:0;right:0;bottom:0;z-index:6;
  background:#fff;
  border-radius:24px 24px 0 0;
  box-shadow:0 -12px 40px rgba(0,0,0,0.12);
  transform:translateY(110%);
  transition:transform .3s cubic-bezier(.2,.8,.2,1);
  max-height:72vh;overflow-y:auto;
  padding-bottom:calc(12px + env(safe-area-inset-bottom));
}
.drawer.open{transform:translateY(0)}
.drawer-handle{
  width:40px;height:4px;border-radius:2px;background:#e5e5e5;
  margin:10px auto 0;cursor:pointer;
}
.drawer-body{padding:8px 20px 16px}
.drawer-date{
  font-size:12px;color:var(--ink-mute);font-weight:600;
  display:flex;gap:10px;align-items:center;margin-bottom:6px;
}
.drawer-date .sep{width:3px;height:3px;border-radius:50%;background:var(--ink-faint)}
.drawer-dest{
  font-size:24px;font-weight:800;letter-spacing:-0.02em;margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.drawer-dest .mark{color:var(--accent)}
.drawer-dest .mark svg{width:18px;height:18px}

.drawer-photos{
  display:flex;gap:8px;overflow-x:auto;margin:0 -20px 14px;
  padding:0 20px 4px;scroll-snap-type:x mandatory;
}
.drawer-photos::-webkit-scrollbar{display:none}
.drawer-photos img{
  height:220px;border-radius:14px;object-fit:cover;
  flex-shrink:0;scroll-snap-align:start;
  background:var(--bg-card);cursor:pointer;
  max-width:85%;
}

.drawer-story{
  background:var(--bg-card);border-radius:14px;padding:14px 16px;margin-bottom:12px;
  font-size:15px;line-height:1.7;
  font-family:"Noto Sans JP","Inter",sans-serif;
  white-space:pre-wrap;word-break:break-word;
}
.drawer-story.empty{color:var(--ink-mute);font-style:italic;font-size:13px}

.drawer-meta{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;
}
.drawer-chip{
  padding:6px 12px;border-radius:999px;
  background:var(--bg-card);color:var(--ink-dim);
  font-size:12px;font-weight:600;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.drawer-actions{display:flex;gap:8px}
.drawer-actions button,
.drawer-actions a{
  flex:1;padding:12px;border-radius:999px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  text-decoration:none;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.drawer-actions .primary{background:var(--ink);color:#fff}
.drawer-actions .primary:hover{background:#333}
.drawer-actions .danger{background:var(--bg-card);color:var(--accent)}
.drawer-actions .danger:hover{background:#fbe5e8}
.drawer-actions svg{width:14px;height:14px}

/* scrim */
.scrim{
  position:absolute;inset:0;z-index:5;
  background:rgba(0,0,0,0);
  pointer-events:none;transition:background .25s;
}
.scrim.on{background:rgba(0,0,0,0.25);pointer-events:auto}

/* filter pills overlay */
.map-pills{
  position:absolute;top:12px;right:12px;z-index:4;
  display:flex;flex-direction:column;gap:8px;align-items:flex-end;
}
.map-locate{
  width:44px;height:44px;border-radius:50%;
  background:#fff;border:none;box-shadow:var(--shadow-md);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--ink);
}
.map-locate:hover{background:var(--bg-card)}
.map-locate svg{width:20px;height:20px}
</style>
</head>

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s){ return (s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function formatDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;
}
function toast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

  '佐賀': { minLat: 33.0, maxLat: 33.6, minLng: 129.7, maxLng: 130.5 },
  '長崎': { minLat: 32.5, maxLat: 34.7, minLng: 128.6, maxLng: 130.4 },
  '熊本': { minLat: 32.0, maxLat: 33.2, minLng: 130.1, maxLng: 131.3 },
  '大分': { minLat: 32.7, maxLat: 33.8, minLng: 130.8, maxLng: 132.1 },
  '宮崎': { minLat: 31.4, maxLat: 32.9, minLng: 130.7, maxLng: 131.9 },
  '鹿児島': { minLat: 27.0, maxLat: 32.4, minLng: 128.4, maxLng: 131.2 },
  '沖縄': { minLat: 24.0, maxLat: 27.9, minLng: 122.9, maxLng: 131.3 },
};

function getPrefecture(lat, lng) {
  for (const [pref, bounds] of Object.entries(PREF_BOUNDS)) {
    if (lat >= bounds.minLat && lat <= bounds.maxLat &&
        lng >= bounds.minLng && lng <= bounds.maxLng) {
      return pref;
    }
  }
  return null;
}

// ============================================================
// MAP APPLICATION
// ============================================================
let map = null;
let mapTrips = [];
let markers = {};
let infoWindow = null;

function moodColor(mood){
  if(mood === '最高！' || mood === '最高') return '#e60023';
  if(mood === '楽しかった' || mood === '良い') return '#f59e0b';
  if(mood === 'まあまあ') return '#16a34a';
  if(mood === 'ふつう') return '#767676';
  if(mood === 'つかれた…' || mood === '微妙') return '#4b4b4b';
  return '#e60023';
}

function markerIcon(trip){
  const color = moodColor(trip.mood);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
    <defs>
      <filter id="s${trip.id}" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
      </filter>
    </defs>
    <path d="M16 40 C16 40 3 25 3 15 A13 13 0 0 1 29 15 C29 25 16 40 16 40 Z"
          fill="${color}" stroke="#fff" stroke-width="2.5" filter="url(#s${trip.id})"/>
    <circle cx="16" cy="15" r="5" fill="#fff"/>
  </svg>`;
  return {
    url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
    scaledSize: new google.maps.Size(32, 42),
    anchor: new google.maps.Point(16, 40),
  };
}

function openDrawer(trip){
  const drawer = document.getElementById('drawer');
  const body = document.getElementById('drawer-body');
  const scrim = document.getElementById('scrim');
  const photos = (trip.photos || []).filter(p => p && (p.url || p.image));
  const story = trip.highlight || (photos[0] && photos[0].caption) || '';
  const pref = getPrefecture(+trip.lat, +trip.lng);
  body.innerHTML = `
    <div class="drawer-date">
      <span>${formatDate(trip.date) || '—'}</span>
      ${pref ? `<span class="sep"></span><span>${escapeHtml(pref)}</span>` : ''}
    </div>
    <div class="drawer-dest">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="2.5" fill="currentColor"/></svg></span>
      ${escapeHtml(trip.destination || 'どこか')}
    </div>
    ${photos.length ? `
      <div class="drawer-photos">
        ${photos.map(p=>`<img src="${escapeAttr(p.url || p.image)}" alt="" onclick="window.open('${escapeAttr(p.url || p.image)}','_blank')">`).join('')}
      </div>
    ` : ''}
    <div class="drawer-story ${story ? '' : 'empty'}">${story ? escapeHtml(story) : 'この旅にはまだ言葉が残されていません。フィードから書き残してみよう。'}</div>
    <div class="drawer-meta">
      ${trip.weather ? `<span class="drawer-chip">${escapeHtml(trip.weather)}</span>` : ''}
      ${trip.mood ? `<span class="drawer-chip" style="color:#fff;background:${moodColor(trip.mood)}">${escapeHtml(trip.mood)}</span>` : ''}
      ${trip.companion ? `<span class="drawer-chip">${escapeHtml(trip.companion)}</span>` : ''}
    </div>
    <div class="drawer-actions">
      <a class="primary" href="timeline.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 15l-5-5L5 19"/></svg>
        フィードで見る
      </a>
      <button class="danger" id="drawer-del">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
        削除
      </button>
    </div>
  `;
  drawer.classList.add('open');
  scrim.classList.add('on');
  document.getElementById('drawer-del').onclick = ()=> deleteTrip(trip.id);
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('scrim').classList.remove('on');
}
document.getElementById('scrim').addEventListener('click', closeDrawer);
document.getElementById('drawer-handle').addEventListener('click', closeDrawer);

async function deleteTrip(tripId){
  if(!confirm('この投稿を削除しますか？')) return;
  try{
    await fetch(TABILOG_CONFIG.GAS_URL, {
      method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'delete', id: tripId })
    });
    if(markers[tripId]){ markers[tripId].setMap(null); delete markers[tripId]; }
    mapTrips = mapTrips.filter(t=>t.id!==tripId);
    closeDrawer();
    updateStats();
    toast('削除しました');
    if(mapTrips.length === 0) showEmpty();
  }catch(e){ toast('削除に失敗', true); }
}

function updateStats(){
  document.getElementById('trip-count').textContent = mapTrips.length;
  const prefs = new Set();
  mapTrips.forEach(t=>{ const p = getPrefecture(+t.lat, +t.lng); if(p) prefs.add(p); });
  document.getElementById('pref-count').textContent = prefs.size;
  document.getElementById('coverage').textContent = Math.round((prefs.size / 47) * 100);
}

function showEmpty(){
  const wrap = document.getElementById('map-wrap');
  wrap.insertAdjacentHTML('beforeend', `
    <div class="map-empty" id="empty">
      <div class="map-empty-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="map-empty-title">まだピンがない</div>
      <div class="map-empty-msg">写真を投稿すると、撮った場所が地図に並んでいくよ。日本地図を旅で埋めていこう。</div>
      <a class="map-empty-btn" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        最初の1枚を投稿
      </a>
    </div>
  `);
}

// Light Google Map style — Pinterest-ish
const LIGHT_MAP_STYLE = [
  { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
  { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
  { elementType: "labels.text.fill", stylers: [{ color: "#767676" }] },
  { elementType: "labels.text.stroke", stylers: [{ color: "#ffffff" }] },
  { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#4b4b4b" }] },
  { featureType: "poi", stylers: [{ visibility: "off" }] },
  { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
  { featureType: "road", elementType: "labels", stylers: [{ visibility: "off" }] },
  { featureType: "road.arterial", elementType: "geometry", stylers: [{ color: "#ececec" }] },
  { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#e0e0e0" }] },
  { featureType: "transit", stylers: [{ visibility: "off" }] },
  { featureType: "water", elementType: "geometry", stylers: [{ color: "#d9e7f2" }] },
  { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#8ea4b4" }] },
  { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#f2f2f2" }] }
];

async function initMap(){
  const loading = document.getElementById('loading');
  mapTrips = await loadTrips();
  loading.style.display = 'none';
  updateStats();

  if(mapTrips.length === 0){ showEmpty(); return; }

  document.getElementById('legend').style.display = 'block';

  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 36.5, lng: 138.0 },
    zoom: 5,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
    styles: LIGHT_MAP_STYLE,
    backgroundColor: '#f5f5f5',
    gestureHandling: 'greedy',
  });

  const bounds = new google.maps.LatLngBounds();
  mapTrips.forEach(trip=>{
    if(!trip.lat || !trip.lng) return;
    const pos = { lat: +trip.lat, lng: +trip.lng };
    bounds.extend(pos);
    const marker = new google.maps.Marker({
      position: pos, map, icon: markerIcon(trip), title: trip.destination, optimized: true,
    });
    markers[trip.id] = marker;
    marker.addListener('click', ()=> openDrawer(trip));
  });

  if(mapTrips.length === 1){
    map.setCenter(bounds.getCenter()); map.setZoom(10);
  } else {
    map.fitBounds(bounds, { padding: 80 });
  }

  document.getElementById('map-locate').addEventListener('click', ()=>{
    if(!navigator.geolocation){ toast('位置情報に非対応', true); return; }
    navigator.geolocation.getCurrentPosition(
      pos => { map.panTo({lat:pos.coords.latitude, lng:pos.coords.longitude}); map.setZoom(12); },
      () => toast('現在地を取得できません', true),
      { enableHighAccuracy:true, timeout:8000 }
    );
  });
}
window.initMap = initMap;

function loadGoogleMapsAPI(){
  if(!TABILOG_CONFIG.MAPS_API_KEY){ toast('Maps APIキー未設定', true); return; }
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${TABILOG_CONFIG.MAPS_API_KEY}&callback=initMap`;
  s.async = true; s.defer = true;
  document.head.appendChild(s);
}
document.addEventListener('DOMContentLoaded', loadGoogleMapsAPI);
</script>
