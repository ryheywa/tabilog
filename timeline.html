<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>フィード / tabilog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ====== SHARED STYLES (inlined from _shared.css concept) ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --bg-soft:#f7f7f7;
  --bg-card:#f2f2f2;
  --bg-hover:#e9e9e9;
  --line:#ececec;
  --line-2:#d9d9d9;
  --ink:#111111;
  --ink-dim:#4b4b4b;
  --ink-mute:#767676;
  --ink-faint:#a8a8a8;
  --accent:#e60023;
  --accent-hover:#b5001b;
  --success:#16a34a;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 24px 60px rgba(0,0,0,0.18);
}

html,body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:"Inter","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100dvh;
  overscroll-behavior-y:contain;
}
input,textarea,button,select{font-family:inherit;color:inherit;font-size:16px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

.jp{font-family:"Noto Sans JP","Inter",sans-serif}

/* ====== NAV ====== */
.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,0.9);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line);
}
.nav-inner{
  max-width:720px;margin:0 auto;
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;
}
.brand-name{font-size:18px;font-weight:700;letter-spacing:-0.01em}
.nav-search{
  flex:1;display:flex;align-items:center;gap:10px;
  background:var(--bg-card);border-radius:999px;
  padding:10px 16px;min-width:0;
}
.nav-search svg{width:18px;height:18px;color:var(--ink-mute);flex-shrink:0}
.nav-search input{
  flex:1;border:none;background:none;outline:none;
  font-size:15px;min-width:0;
}
.nav-search input::placeholder{color:var(--ink-faint)}
.nav-save{
  padding:10px 18px;border-radius:999px;
  background:var(--accent);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;
  flex-shrink:0;text-decoration:none;
}
.nav-save:hover{background:var(--accent-hover)}
.nav-save svg{width:14px;height:14px}

/* ====== TABBAR ====== */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:rgba(255,255,255,0.96);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-inner{
  max-width:720px;margin:0 auto;
  display:grid;grid-template-columns:repeat(3,1fr);
  height:64px;
}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--ink-mute);cursor:pointer;background:none;border:none;
  transition:color .15s;text-decoration:none;
  font-family:"Noto Sans JP","Inter",sans-serif;font-size:11px;font-weight:700;
}
.tab svg{width:24px;height:24px}
.tab.on{color:var(--ink)}
.tab.on svg{stroke-width:2.4}
.tab:hover{color:var(--ink)}

/* ====== TOAST ====== */
.toast{
  position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(8px);
  background:#111;color:#fff;
  padding:12px 22px;border-radius:999px;
  font-size:14px;font-weight:600;white-space:nowrap;
  opacity:0;pointer-events:none;z-index:100;
  transition:all .25s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--accent)}

/* ====== MODAL ====== */
.modal{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,0);
  pointer-events:none;transition:background .25s;
}
.modal.open{background:rgba(0,0,0,0.4);pointer-events:auto}
.modal-card{
  width:100%;max-width:480px;
  background:#fff;border-radius:24px 24px 0 0;
  padding:12px 24px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.2,.8,.2,1);
}
.modal.open .modal-card{transform:translateY(0)}
.modal-handle{
  width:40px;height:4px;border-radius:2px;background:#e5e5e5;
  margin:0 auto 16px;
}
.modal-title{
  font-size:20px;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.modal-sub{
  font-size:14px;color:var(--ink-mute);margin-bottom:20px;
}
.form-row{margin-bottom:18px}
.form-label{
  display:block;font-size:12px;font-weight:700;color:var(--ink-mute);
  letter-spacing:0.06em;margin-bottom:6px;
}
.input{
  width:100%;padding:12px 14px;border-radius:12px;
  border:1.5px solid var(--line-2);background:#fff;outline:none;
  font-size:15px;transition:border-color .15s;
}
.input:focus{border-color:var(--ink)}
.emoji-grid{
  display:flex;flex-wrap:wrap;gap:8px;
}
.emoji-grid button{
  width:44px;height:44px;border-radius:12px;
  background:var(--bg-card);border:2px solid transparent;
  font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.emoji-grid button:hover{background:var(--bg-hover)}
.emoji-grid button.selected{border-color:var(--ink);background:#fff}
.modal-actions{
  display:flex;gap:10px;margin-top:8px;
}
.modal-actions button{
  flex:1;padding:14px;border-radius:999px;border:none;cursor:pointer;
  font-size:15px;font-weight:700;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.modal-actions .cancel{background:var(--bg-card);color:var(--ink)}
.modal-actions .cancel:hover{background:var(--bg-hover)}
.modal-actions .ok{background:var(--ink);color:#fff}
.modal-actions .ok:hover{background:#333}

/* ==================== TIMELINE-SPECIFIC ==================== */

/* profile header */
.profile{
  max-width:960px;margin:0 auto;padding:32px 20px 8px;
}
.profile-top{
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
.avatar{
  width:96px;height:96px;border-radius:50%;
  background:#efefef;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:700;color:var(--ink-mute);
  overflow:hidden;position:relative;flex-shrink:0;cursor:pointer;
  border:2px solid #fff;box-shadow:var(--shadow-sm);
}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar .edit-dot{
  position:absolute;right:0;bottom:0;
  width:28px;height:28px;border-radius:50%;
  background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;
}
.avatar .edit-dot svg{width:14px;height:14px}

.profile-meta{flex:1;min-width:200px}
.profile-name{font-size:26px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px}
.profile-handle{font-size:15px;color:var(--ink-mute);font-weight:500;margin-bottom:10px}
.profile-stats{display:flex;gap:18px;flex-wrap:wrap}
.pstat{font-size:13px;color:var(--ink-dim)}
.pstat b{color:var(--ink);font-weight:700}

.profile-actions{display:flex;gap:8px;flex-wrap:wrap}
.pf-btn{
  padding:10px 16px;border-radius:999px;
  background:var(--bg-card);border:none;color:var(--ink);
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:"Noto Sans JP","Inter",sans-serif;
  transition:background .15s;
}
.pf-btn:hover{background:var(--bg-hover)}
.pf-btn.primary{background:var(--ink);color:#fff}
.pf-btn.primary:hover{background:#333}

/* tabs */
.pf-tabs{
  max-width:960px;margin:32px auto 0;
  padding:0 20px;
  display:flex;justify-content:center;gap:32px;
  border-bottom:1px solid var(--line);
}
.pf-tab{
  padding:14px 4px;background:none;border:none;
  font-size:15px;font-weight:700;color:var(--ink-mute);
  cursor:pointer;position:relative;
  font-family:"Noto Sans JP","Inter",sans-serif;
  display:inline-flex;align-items:center;gap:6px;
}
.pf-tab.active{color:var(--ink)}
.pf-tab.active::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;
  height:3px;background:var(--ink);border-radius:3px 3px 0 0;
}
.pf-tab:hover{color:var(--ink)}

/* board chips */
.chip-row{
  max-width:960px;margin:0 auto;padding:18px 20px 6px;
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  padding:9px 14px;border-radius:999px;
  background:var(--bg-card);border:none;
  font-size:14px;font-weight:600;color:var(--ink-dim);cursor:pointer;
  white-space:nowrap;transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;
  font-family:"Noto Sans JP","Inter",sans-serif;
  min-height:38px;
}
.chip:hover{background:var(--bg-hover);color:var(--ink)}
.chip.active{background:var(--ink);color:#fff}
.chip .count{
  font-size:12px;padding:1px 7px;border-radius:999px;
  background:rgba(0,0,0,0.06);font-variant-numeric:tabular-nums;
}
.chip.active .count{background:rgba(255,255,255,0.18);color:#fff}

/* masonry */
.masonry{
  max-width:1400px;margin:0 auto;padding:16px 16px 80px;
  column-count:2;column-gap:10px;
}
@media (min-width:640px){ .masonry{column-count:3;column-gap:12px;padding:20px 20px 100px} }
@media (min-width:900px){ .masonry{column-count:4} }
@media (min-width:1200px){ .masonry{column-count:5} }
@media (min-width:1500px){ .masonry{column-count:6} }

.pin{
  break-inside:avoid;margin-bottom:10px;
  border-radius:16px;overflow:hidden;
  position:relative;cursor:pointer;
  background:var(--bg-card);
  transition:transform .2s, box-shadow .2s;
}
@media (min-width:640px){ .masonry .pin{margin-bottom:12px;border-radius:16px} }
.pin:hover{box-shadow:var(--shadow-md)}
.pin-img{
  width:100%;display:block;
  background:var(--bg-card);
  transition:transform .4s cubic-bezier(.2,.8,.2,1);
}
.pin:hover .pin-img{transform:scale(1.025)}
.pin-tag{
  position:absolute;top:10px;left:10px;
  padding:5px 10px;border-radius:999px;
  background:rgba(255,255,255,0.96);color:var(--ink);
  font-size:11px;font-weight:700;
  backdrop-filter:blur(4px);
  display:inline-flex;align-items:center;gap:5px;
  opacity:0;transition:opacity .15s;
  box-shadow:var(--shadow-sm);
}
.pin:hover .pin-tag{opacity:1}
.pin-tag .tag-dot{
  width:5px;height:5px;border-radius:50%;background:var(--success);
}
.pin-save{
  position:absolute;top:10px;right:10px;
  padding:8px 14px;border-radius:999px;
  background:var(--accent);color:#fff;
  font-size:13px;font-weight:700;border:none;cursor:pointer;
  opacity:0;transition:all .15s;
  box-shadow:var(--shadow-md);
}
.pin:hover .pin-save{opacity:1}
.pin-save:hover{background:var(--accent-hover)}
.pin-overlay{
  position:absolute;left:0;right:0;bottom:0;
  padding:14px 12px 10px;
  color:#fff;
  background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.72) 100%);
  opacity:0;transition:opacity .2s;
  pointer-events:none;
}
.pin:hover .pin-overlay{opacity:1}
.pin-caption{
  font-size:13px;font-weight:600;line-height:1.4;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.pin-meta{
  display:flex;gap:8px;font-size:11px;opacity:0.88;margin-top:4px;font-weight:500;
}
.pin-meta .dest{font-weight:700}

/* fade-up for pins */
.pin.fade-up{animation:fadeup .35s ease-out both}
@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* boards grid */
.boards-grid{
  max-width:1400px;margin:0 auto;padding:20px 20px 100px;
  display:grid;grid-template-columns:repeat(auto-fill, minmax(220px,1fr));gap:16px;
}
.board-card{
  cursor:pointer;
  transition:transform .2s;
}
.board-card:hover{transform:translateY(-2px)}
.board-cover{
  width:100%;aspect-ratio:1/1;
  border-radius:16px;overflow:hidden;
  display:grid;grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
  background:var(--bg-card);
  position:relative;
}
.board-cover.empty{
  display:flex;align-items:center;justify-content:center;
  font-size:56px;
  background:var(--bg-card);
}
.board-cover .bc{
  width:100%;height:100%;
  background-size:cover;background-position:center;
  background-color:#ddd;position:relative;
}
.board-cover .bc:nth-child(1){grid-row:1/3}
.board-cover .more{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.5);
  color:#fff;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(2px);
}
.board-meta{padding:10px 4px 0}
.board-name{
  font-size:16px;font-weight:700;
  display:flex;align-items:center;gap:6px;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.board-emoji{font-size:18px}
.board-stats{font-size:12px;color:var(--ink-mute);margin-top:2px}

.board-card.new .board-cover{
  display:flex;align-items:center;justify-content:center;
  border:1.5px dashed var(--line-2);background:transparent;
}
.board-card.new .plus{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  color:var(--ink-mute);
  font-family:"Noto Sans JP","Inter",sans-serif;
  font-size:14px;font-weight:600;
}
.board-card.new .plus-circle{
  width:48px;height:48px;border-radius:50%;
  background:var(--bg-card);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:300;
}
.board-card.new:hover .board-cover{border-color:var(--ink);background:var(--bg-card)}
.board-card.new:hover .plus,
.board-card.new:hover .plus-circle{color:var(--ink)}

/* board detail view */
.bd{
  max-width:1400px;margin:0 auto;padding:24px 20px 100px;
}
.bd-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:999px;background:var(--bg-card);border:none;
  font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;margin-bottom:18px;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.bd-back:hover{background:var(--bg-hover)}
.bd-back svg{width:14px;height:14px}
.bd-header{
  display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
  margin-bottom:24px;flex-wrap:wrap;
}
.bd-title{
  font-size:40px;font-weight:800;letter-spacing:-0.03em;
  display:flex;align-items:center;gap:12px;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.bd-title .emoji{font-size:36px}
.bd-sub{
  color:var(--ink-mute);font-size:14px;margin-top:6px;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
}
.bd-sub .sep{width:3px;height:3px;border-radius:50%;background:var(--ink-faint)}
.bd-sub .count-big{color:var(--ink);font-weight:700}
.bd-actions{display:flex;gap:8px}
.bd-action{
  padding:10px 16px;border-radius:999px;background:var(--bg-card);border:none;
  font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.bd-action:hover{background:var(--bg-hover)}
.bd-action.danger{color:var(--accent)}
.bd-action.danger:hover{background:#fbe5e8}

/* lightbox */
.lb{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.85);
  display:none;align-items:flex-start;justify-content:center;
  padding:40px 16px;overflow-y:auto;
}
.lb.active{display:flex;animation:fadein .25s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.lb-card{
  width:100%;max-width:960px;
  background:#fff;border-radius:24px;overflow:hidden;
  display:grid;grid-template-columns:1fr;
  animation:lbup .3s cubic-bezier(.2,.8,.2,1);
}
@keyframes lbup{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@media (min-width:760px){
  .lb-card{grid-template-columns:1fr 1fr}
}
.lb-img{
  background:#000;
  display:flex;align-items:center;justify-content:center;
  min-height:320px;
}
.lb-img img{
  width:100%;max-height:85vh;object-fit:contain;
}
.lb-body{padding:28px 26px}
.lb-date{
  font-size:13px;color:var(--ink-mute);font-weight:600;
  display:flex;gap:10px;align-items:center;margin-bottom:8px;
}
.lb-date .sep{width:3px;height:3px;border-radius:50%;background:var(--ink-faint)}
.lb-dest{
  font-size:26px;font-weight:800;letter-spacing:-0.02em;
  display:flex;align-items:center;gap:8px;margin-bottom:18px;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.lb-dest .pin-mark{color:var(--accent)}
.lb-dest .pin-mark svg{width:22px;height:22px}

.lb-story{
  background:var(--bg-card);border-radius:16px;
  padding:18px;margin-bottom:18px;
}
.lb-story-label{
  font-size:11px;font-weight:700;color:var(--ink-mute);
  letter-spacing:0.08em;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
}
.lb-story-body{
  font-size:16px;line-height:1.7;color:var(--ink);
  font-family:"Noto Sans JP","Inter",sans-serif;
  white-space:pre-wrap;word-break:break-word;
}
.lb-story-body.empty{color:var(--ink-mute);font-style:italic;font-size:14px}
.lb-edit{
  background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:13px;font-weight:700;
  display:inline-flex;align-items:center;gap:4px;
}
.lb-edit svg{width:13px;height:13px}

.lb-story textarea{
  width:100%;min-height:140px;resize:vertical;
  border:1.5px solid var(--line-2);border-radius:12px;
  padding:12px 14px;background:#fff;outline:none;
  font-size:15px;line-height:1.7;font-family:"Noto Sans JP","Inter",sans-serif;
  transition:border-color .15s;
}
.lb-story textarea:focus{border-color:var(--ink)}
.lb-story-editor-actions{
  display:flex;gap:8px;margin-top:10px;justify-content:flex-end;flex-wrap:wrap;
}
.lb-story-editor-actions button{
  padding:8px 14px;border-radius:999px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;
  font-family:"Noto Sans JP","Inter",sans-serif;
}
.lb-cancel{background:var(--bg-hover);color:var(--ink)}
.lb-save{background:var(--ink);color:#fff}
.lb-save:hover{background:#333}
.lb-mic{
  background:#fff;border:1px solid var(--line-2);color:var(--ink);
  display:inline-flex;align-items:center;gap:4px;margin-right:auto;
}
.lb-mic.rec{background:var(--accent);color:#fff;border-color:var(--accent)}
.lb-mic svg{width:14px;height:14px}

.lb-section-label{
  font-size:11px;font-weight:700;color:var(--ink-mute);
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;
}
.lb-boards{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;
}
.lb-board-chip{
  padding:7px 12px;border-radius:999px;
  background:#fff;border:1.5px solid var(--line-2);color:var(--ink-dim);

<script>

// ============================================================

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s){ return (s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function formatDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;
}
function toast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

async function loadTrips(){
  try{
    const res = await fetch(TABILOG_CONFIG.GAS_URL);
    const json = await res.json();
    if(json.success && json.data) return json.data;
    return [];
  }catch(e){ console.error(e); return []; }
}

// Board storage
function loadBoards(){
  try{ return JSON.parse(localStorage.getItem(TABILOG_CONFIG.BOARDS_KEY) || '[]'); }
  catch(e){ return []; }
}
function saveBoards(boards){
  localStorage.setItem(TABILOG_CONFIG.BOARDS_KEY, JSON.stringify(boards));
}

// Assign storage (pin → boards mapping)
function loadAssign(){
  try{ return JSON.parse(localStorage.getItem(TABILOG_CONFIG.ASSIGN_KEY) || '{}'); }
  catch(e){ return {}; }
}
function saveAssign(map){
  localStorage.setItem(TABILOG_CONFIG.ASSIGN_KEY, JSON.stringify(map));
}

// ============================================================
// PREFECTURE DETECTION
// ============================================================
const PREF_BOUNDS = {

  '富山': { minLat: 36.3, maxLat: 36.9, minLng: 136.8, maxLng: 137.8 },

  '沖縄': { minLat: 24.0, maxLat: 27.9, minLng: 122.9, maxLng: 131.3 },
};

function getPrefecture(lat, lng) {
  for (const [pref, bounds] of Object.entries(PREF_BOUNDS)) {
    if (lat >= bounds.minLat && lat <= bounds.maxLat &&
        lng >= bounds.minLng && lng <= bounds.maxLng) {
      return pref;
    }
  }
  return null;
}

// ============================================================
// TRIP → PIN CONVERSION
// ============================================================
function tripsToPins(trips){
  const pins = [];
  trips.forEach(trip=>{
    const photos = (trip.photos || []).filter(p => p && (p.url || p.image));
    if(photos.length === 0) return;
    photos.forEach((photo, idx)=>{
      pins.push({
        id: `${trip.id}_${idx}`,
        tripId: trip.id,
        url: photo.url || photo.image,
        caption: photo.caption || '',
        destination: trip.destination,
        date: trip.date,
        highlight: trip.highlight || '',
        mood: trip.mood,
        weather: trip.weather,
        routes: trip.routes,
        lat: trip.lat,
        lng: trip.lng,
      });
    });
  });
  return pins.sort((a,b)=> new Date(b.date||0) - new Date(a.date||0));
}

function getPinBoards(pin, assignMap){
  return assignMap[pin.id] || [];
}

// Story override storage (local edits before sync)
function saveStoryOverride(tripId, text){
  const key = 'tabilog.story.override';
  const map = JSON.parse(localStorage.getItem(key) || '{}');
  map[tripId] = text;
  localStorage.setItem(key, JSON.stringify(map));
}

// ============================================================
// TIMELINE APPLICATION
// ============================================================
(function(){
  let trips = [];
  let boards = loadBoards();
  let assignMap = loadAssign();
  let ALL_PINS = [];
  let activeBoardFilter = '__all';
  let currentView = 'feed';
  let searchQuery = '';

  // ============== RENDER: FEED ==============
  function renderFeedChips(){
    const wrap = document.getElementById('feed-chips');
    const all = ALL_PINS.length;
    wrap.innerHTML = `<button class="chip ${activeBoardFilter==='__all'?'active':''}" data-board="__all">すべて <span class="count">${all}</span></button>` +
      boards.map(b=>{
        const n = ALL_PINS.filter(p=>getPinBoards(p, assignMap).includes(b.id)).length;
        return `<button class="chip ${activeBoardFilter===b.id?'active':''}" data-board="${b.id}">${b.emoji} ${escapeHtml(b.name)} <span class="count">${n}</span></button>`;
      }).join('');
    wrap.querySelectorAll('.chip').forEach(el=>{
      el.addEventListener('click', ()=>{
        activeBoardFilter = el.dataset.board;
        renderFeedChips();
        renderMasonry();
      });
    });
    document.getElementById('stat-pins').textContent = all;
    document.getElementById('stat-boards').textContent = boards.length;
    const prefs = new Set();
    trips.forEach(t=>{ const p = getPrefecture(t.lat, t.lng); if(p) prefs.add(p); });
    document.getElementById('stat-pref').textContent = prefs.size;
  }

  function filterPins(){
    let pins = activeBoardFilter === '__all'
      ? ALL_PINS
      : ALL_PINS.filter(p => getPinBoards(p, assignMap).includes(activeBoardFilter));
    if(searchQuery){
      const q = searchQuery.toLowerCase();
      pins = pins.filter(p=>{
        return ((p.destination||'') + ' ' + (p.caption||'') + ' ' + (p.highlight||'')).toLowerCase().includes(q);
      });
    }
    return pins;
  }

  function renderMasonry(){
    const wrap = document.getElementById('masonry');
    const pins = filterPins();

    if(pins.length === 0){
      wrap.innerHTML = `
        <div class="empty" style="column-span:all">
          <div class="empty-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 15l-5-5L5 19"/></svg></div>
          <div class="empty-title">まだピンがない</div>
          <div class="empty-msg">写真を1枚投稿すると、ここに並んでいくよ。</div>
          <a class="empty-btn" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" style="width:14px;height:14px"><path d="M12 5v14M5 12h14"/></svg>
            投稿する
          </a>
        </div>`;
      return;
    }

    wrap.innerHTML = pins.map((p,i)=>{
      const assigned = getPinBoards(p, assignMap);
      const firstBoard = assigned[0] ? boards.find(b=>b.id===assigned[0]) : null;
      const delay = Math.min(i*20, 300);
      return `
        <div class="pin fade-up" style="animation-delay:${delay}ms" data-pid="${p.id}">
          <img class="pin-img" src="${escapeAttr(p.url)}" alt="" loading="lazy">
          ${firstBoard ? `<div class="pin-tag"><span class="tag-dot"></span>${firstBoard.emoji} ${escapeHtml(firstBoard.name)}</div>` : ''}
          <button class="pin-save" data-pid="${p.id}">保存</button>
          <div class="pin-overlay">
            <div class="pin-caption">${escapeHtml(p.highlight || p.caption || p.destination || '')}</div>
            <div class="pin-meta">
              <span class="dest">${escapeHtml(p.destination||'')}</span>

  function renderBoards(){
    const wrap = document.getElementById('boards-grid');
    const html = boards.map(b=>{
      const pins = ALL_PINS.filter(p=>getPinBoards(p, assignMap).includes(b.id));
      const covers = pins.slice(0,3);
      const more = Math.max(0, pins.length - 3);
      let coverHtml;
      if(covers.length === 0){
        coverHtml = `<div class="board-cover empty">${b.emoji}</div>`;
      } else {
        const cells = [0,1,2].map(i=>{
          const p = covers[i];
          if(!p) return `<div class="bc"></div>`;
          const moreHtml = (i===2 && more>0) ? `<div class="more">+${more}</div>` : '';
          return `<div class="bc" style="background-image:url('${escapeAttr(p.url)}')">${moreHtml}</div>`;
        }).join('');
        coverHtml = `<div class="board-cover">${cells}</div>`;
      }
      return `
        <div class="board-card" data-bid="${b.id}">
          ${coverHtml}
          <div class="board-meta">
            <div class="board-name"><span class="board-emoji">${b.emoji}</span>${escapeHtml(b.name)}</div>
            <div class="board-stats">${pins.length} 件</div>
          </div>
        </div>`;
    }).join('') + `
      <div class="board-card new" id="new-board-btn">
        <div class="board-cover">
          <div class="plus">
            <div class="plus-circle">+</div>
            <div>新しいボード</div>
          </div>
        </div>
      </div>`;
    wrap.innerHTML = html;
    wrap.querySelectorAll('.board-card[data-bid]').forEach(el=>{
      el.addEventListener('click', ()=> openBoardDetail(el.dataset.bid));

    function stopRec(){
      if(recognizer){ try{ recognizer.stop(); }catch(e){} }
      recording = false; micBtn.classList.remove('rec'); micLabel.textContent = '音声';
    }
    micBtn.addEventListener('click', ()=>{
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){ toast('この端末は音声入力に非対応', true); return; }
      if(recording){ stopRec(); return; }
      recognizer = new SR();
      recognizer.lang = 'ja-JP'; recognizer.continuous = true; recognizer.interimResults = false;
      recognizer.onresult = (ev)=>{
        let s = '';
        for(let i=ev.resultIndex;i<ev.results.length;i++) if(ev.results[i].isFinal) s += ev.results[i][0].transcript;
        if(s){ input.value = input.value ? (input.value.replace(/\s+$/,'') + ' ' + s) : s; }
      };
      recognizer.onerror = stopRec;
      recognizer.onend = ()=>{ if(recording){ try{ recognizer.start(); }catch(e){ stopRec(); } } };
      try{ recognizer.start(); recording = true; micBtn.classList.add('rec'); micLabel.textContent = '停止'; }
      catch(e){ toast('音声入力を開始できません', true); }
    });

  (function setupProfile(){
    const saved = (()=>{ try{return JSON.parse(localStorage.getItem(TABILOG_CONFIG.PROFILE_KEY)||'{}')}catch(e){return {}} })();
    const nameEl = document.getElementById('profile-name');
    const handleEl = document.getElementById('profile-handle');
    const initialEl = document.getElementById('avatar-initial');
    const avatarEl = document.getElementById('avatar');
    const input = document.getElementById('avatar-input');

    function paint(){
      const name = saved.name || 'Tabilogger';
      const handle = saved.handle || '@tabilog';
      nameEl.textContent = name;
      handleEl.textContent = handle;
      initialEl.textContent = (name[0]||'T').toUpperCase();
      const existing = avatarEl.querySelector('img');
      if(existing) existing.remove();
      if(saved.avatar){
        const img = document.createElement('img');
        img.src = saved.avatar;
        avatarEl.insertBefore(img, avatarEl.firstChild);
      }
    }
    paint();
    avatarEl.addEventListener('click', (e)=>{
      if(e.target.closest('input')) return;
      input.click();
    });
    input.addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      try{
        const dataUrl = await fileToDataUrl(file, 400);
        saved.avatar = dataUrl;
        localStorage.setItem(TABILOG_CONFIG.PROFILE_KEY, JSON.stringify(saved));
        paint();
        toast('プロフィール画像を更新');
      }catch(err){ toast('画像の読み込みに失敗', true); }
    });
    document.getElementById('btn-edit-profile').addEventListener('click', ()=>{
      const newName = prompt('表示名を入力', saved.name || 'Tabilogger');
      if(newName === null) return;
      if(newName.trim()) saved.name = newName.trim();
      const newHandle = prompt('ユーザー名（@なし）', (saved.handle||'@tabilog').replace(/^@/,''));
      if(newHandle === null) return;
      if(newHandle.trim()) saved.handle = '@' + newHandle.trim().replace(/^@/,'');
      localStorage.setItem(TABILOG_CONFIG.PROFILE_KEY, JSON.stringify(saved));
      paint();
    });
    document.getElementById('btn-share').addEventListener('click', async ()=>{
      try{
        if(navigator.share){
          await navigator.share({title:'tabilog', text:'旅の記録', url: location.href});
        } else {
          await navigator.clipboard.writeText(location.href);
          toast('URLをコピーしました');
        }
      }catch(e){}
    });

    function fileToDataUrl(file, maxSide){
      return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=>{
          const img = new Image();
          img.onload = ()=>{
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
            const cv = document.createElement('canvas');
            cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(cv.toDataURL('image/jpeg', 0.9));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  })();

      { seed:'curry-plate', destination:'横浜', caption:'横須賀海軍カレー。', h:640, mood:'楽しかった', weather:'晴れ', routes:['横浜','横須賀'], date:'2025-10-12' },

      { seed:'street-dog', destination:'下北沢', caption:'友達の犬、旅仲間。', h:850, mood:'楽しかった', weather:'晴れ', routes:['下北沢'], date:'2025-09-15' },

    ];
    const fakeTrips = shots.map((s,i)=>({
      id: 900000+i, destination:s.destination, date:s.date, highlight:s.highlight||'',
      mood:s.mood, weather:s.weather, routes:s.routes,
      lat: 35 + Math.random()*5, lng: 135 + Math.random()*4,
      photos:[{ url:`https://picsum.photos/seed/${s.seed}/800/${s.h}`, caption:s.caption }]
    }));
    trips = fakeTrips; // so stats work
    return tripsToPins(fakeTrips);
  }

  // ============== BOOT ==============
  async function boot(){
    trips = await loadTrips();
    let pins = tripsToPins(trips);
    if(pins.length === 0){ pins = demoPins(); }
    ALL_PINS = pins;
    renderFeedChips();
    renderMasonry();
    renderBoards();
  }
  boot();
})();
